set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Allow tmux to recognize modified keys such as Shift+Enter from capable terminals.
set -s extended-keys on
set -as terminal-features ',xterm*:extkeys'

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

bind -r ] next-window
bind -r [ previous-window

set -g mouse on

set -g status-position bottom

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'fabioluciano/tmux-powerkit'


set -g @powerkit_status_position "bottom"
set -g @powerkit_theme "tokyo-night"
set -g @powerkit_theme_variant "night"

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Custom 'is_vim' check that includes opencode
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?(view|l?n?vim?x?|fzf|opencode)(diff)?(-wrapped)?$'"

# Dedicated OpenCode check so tmux can translate Shift+Enter to OpenCode's newline shortcut.
is_opencode="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+/)?opencode(-wrapped)?$'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/.tmux/plugins/"
run '~/.config/tmux/.tmux/plugins/tpm/tpm'

# Reapply these after TPM loads so vim-tmux-navigator doesn't override OpenCode behavior.
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'S-Enter' if-shell "$is_opencode" 'send-keys C-j' 'send-keys S-Enter'
